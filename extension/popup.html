<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Re-Ranker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1f1f1f;
      background: #fff;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 22px; height: 22px;
      background: #1a73e8;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 13px; height: 13px; fill: white; }
    .header h1 { font-size: 14px; font-weight: 600; color: #1f1f1f; }
    .header span { font-size: 11px; color: #888; margin-left: auto; }

    /* ── Stat grid ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
    }
    .stat {
      background: #fff;
      padding: 12px 10px;
      text-align: center;
    }
    .stat-val {
      font-size: 22px;
      font-weight: 600;
      color: #1a73e8;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Section ── */
    .section { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ── Recent queries ── */
    .query-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #f8f8f8;
      gap: 8px;
    }
    .query-row:last-child { border-bottom: none; }
    .query-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #1f1f1f;
    }
    .query-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .pill {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 500;
    }
    .pill-click  { background: #e8f0fe; color: #1a73e8; }
    .pill-skip   { background: #fce8e6; color: #c5221f; }
    .pill-dwell  { background: #e6f4ea; color: #137333; }

    /* ── Empty state ── */
    .empty {
      padding: 20px 16px;
      text-align: center;
      color: #aaa;
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Buttons ── */
    .btn-row { padding: 10px 16px; display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #dadce0;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: #1f1f1f;
      transition: background 0.15s;
    }
    .btn:hover { background: #f8f8f8; }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .btn-primary:hover { background: #1557b0; }
    .btn-danger { color: #c5221f; border-color: #f5c6c6; }
    .btn-danger:hover { background: #fce8e6; }

    /* ── Status banner ── */
    .status {
      margin: 0 16px 10px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .status.success { background: #e6f4ea; color: #137333; display: block; }
    .status.error   { background: #fce8e6; color: #c5221f; display: block; }

    /* ── Fine-tune tip ── */
    .tip {
      margin: 0 16px 12px;
      padding: 8px 10px;
      background: #fffde7;
      border: 1px solid #fdd835;
      border-radius: 6px;
      font-size: 11px;
      color: #795548;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
  <h1>Search Re-Ranker</h1>
  <span id="last-updated">—</span>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-val" id="stat-searches">0</div>
    <div class="stat-label">Searches</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-clicks">0</div>
    <div class="stat-label">Clicks</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-avg-dwell">—</div>
    <div class="stat-label">Avg dwell</div>
  </div>
</div>

<div id="queries-section" class="section">
  <div class="section-title">Recent queries</div>
  <div id="query-list"><div class="empty">No data yet.<br>Search on Google to start collecting.</div></div>
</div>

<div id="status-msg" class="status"></div>

<div id="finetune-tip" class="tip" style="display:none">
  Export your data, then run <code>python finetune.py --data interactions.json</code> to fine-tune the SBERT model on your click history.
</div>

<div class="btn-row">
  <button class="btn btn-danger" id="btn-clear">Clear data</button>
  <button class="btn btn-primary" id="btn-export">Export JSON</button>
</div>

<script src="popup.js"></script>
</body>
</html>
